name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest
    env:
      # Expose at job level so steps can check availability without using
      # secrets context in `if:` (secrets context is not allowed in conditions)
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Secret Scan (TruffleHog)
        uses: trufflesecurity/trufflehog@6bd2d14f7a4bc1e569fa3550efa7ec632a4fa67b # v3.94.2
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || '' }}
          head: ${{ github.sha }}
          extra_args: --only-verified

      - name: Format check
        run: pnpm prettier --check .

      - name: Lint (ESLint)
        run: pnpm eslint --max-warnings=0

      - name: Lint (Stylelint)
        run: pnpm stylelint "**/*.{css,scss}"

      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0

      - name: Run Hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          format: sonarqube
          output-file: hadolint-results.json
          no-fail: false

      - name: Test with coverage
        run: pnpm test:coverage
        env:
          # Raise the V8 heap limit so test workers do not OOM during
          # coverage collection and merging across 24+ test files.
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload coverage report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: coverage-report
          path: |
            coverage/lcov.info
            coverage/coverage-summary.json
          retention-days: 30

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        # Skip if SONAR_TOKEN is not configured (e.g., in forks or dependabot PRs).
        # Uses env.SONAR_TOKEN (set at job level) because secrets context is not
        # allowed in step `if:` conditions.
        if: ${{ env.SONAR_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Lighthouse CI (desktop)
        # No Supabase env vars: isConfigured() returns false, API routes return
        # 200+[] instead of connecting to a dummy host and returning 500.
        # A 500 would log a browser network error that fails errors-in-console.
        run: pnpm lhci:desktop
